---
# Lisab Dockeri ametliku APT repo (GPG võtmega), paigaldab Docker Engine
# + Compose plugina, lisab petclinic kasutaja docker gruppi (et ta saaks
# konteinereid hallata ilma sudota), ja tagab et docker teenus jookseb.

- name: Ensure keyrings dir exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: Add Docker repo
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
    state: present
    filename: docker

- name: Install Docker engine + compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    update_cache: yes
    state: present

- name: Add app user to docker group
  user:
    name: "{{ app_user }}"
    groups: docker
    append: yes

- name: Ensure docker service running
  service:
    name: docker
    state: started
    enabled: yes
