# Ansible üldsätted. Hoiab seda, et inventory leitaks automaatselt
# ja et esimese ühenduse küsimus host key kohta ei peataks playbooki.

[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
# Uutes Ansible versioonides (2.13+) pole enam eraldi "yaml" callback pluginat.
# Selle asemel kasutatakse vaikimisi default pluginat koos result_format=yaml.
stdout_callback = default
result_format = yaml

[ssh_connection]
pipelining = True
