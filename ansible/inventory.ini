# Inventory fail — siin öeldakse Ansiblele, millise serveriga ta suhtleb.
# Asenda YOUR_SERVER_IP oma serveri IP-ga enne käivitamist.
#
# NB! Kuna võti on paroolikaitsega, käivita enne playbooki:
#   ssh-add ~/.ssh/id_rsa
# See paneb parooli ssh-agendi mällu ja Ansible saab võtit kasutada
# ilma iga kord parooli küsimata.

[petclinic]
petclinic-server ansible_host=YOUR_SERVER_IP

[petclinic:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
